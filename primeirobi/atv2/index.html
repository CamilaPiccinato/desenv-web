<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro</title>
</head>
<body>
    <form action="/processar cadastro.php" method="post">
        <fieldset>
            <legend>Crie sua conta</legend>
            
        <label for="nome">Nome:</label> <br>
        <input type="text" id="nome" name="nome">
        <br><br>
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="password">Senha (mínimo 8 caracteres):</label><br>
        <input type="password" id="password" name="password" required minlength="8"><br>
        <p><strong>Gênero:</strong></p>
        
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="masculino">Masculino</label><br>

        <input type="radio" id="feminino" name="genero" value="feminino">
        <label for="feminino">Feminino</label><br><br>

        <label for="biografia">Biografia:</label><br>
        <textarea name="bio" id="bio" rows="4" placeholder="Fale um pouco sobre você..."></textarea><br>

        <input type="checkbox" name="termos" id="termos" required>
        <label for="termos">Eu li e aceito os termos de serviço.</label>
        </fieldset><br>

        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
